name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libportaudio2 \
            portaudio19-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install httpx numpy sounddevice python-dotenv

      - name: Build Python sidecar
        run: |
          mkdir -p cortex-ui/src-tauri/bin
          pyinstaller \
            --onefile \
            --clean \
            --strip \
            --name cortex-backend-x86_64-unknown-linux-gnu \
            --distpath cortex-ui/src-tauri/bin \
            --specpath /tmp \
            --hidden-import sounddevice \
            --hidden-import _sounddevice_data \
            --collect-all sounddevice \
            cortex.py

      - name: Install frontend dependencies
        working-directory: cortex-ui
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: cortex-ui
          tagName: ${{ github.ref_name }}
          releaseName: 'cortex ${{ github.ref_name }}'
          releaseBody: |
            ## Install (Arch / Omarchy)

            **One command** — installs dependencies, the app, the F8 hotkey, the
            recording overlay, the paste daemon, and autostart:

            ```bash
            curl -fsSL https://raw.githubusercontent.com/cryptob1/oflow/master/install.sh | bash
            ```

            Or grab the prebuilt **AppImage** below (still needs the runtime deps —
            `sudo pacman -S ydotool playerctl gtk4-layer-shell python-gobject python-cairo`):

            ```bash
            chmod +x cortex_*_amd64.AppImage && ./cortex_*_amd64.AppImage
            ```

            ### Setup
            1. Get a free Groq API key: https://console.groq.com/keys
            2. Click the `󰍬` mic icon → Settings → paste your key
            3. **Hold F8** to record, release to stop & paste (end with "press enter" to submit)

            See the [README](https://github.com/cryptob1/oflow#readme) for full docs.
          releaseDraft: false
          prerelease: false
